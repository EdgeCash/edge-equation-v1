name: Spotlight (4pm CT)

# Phase 20 cadence slot 3 of 5: 16:00 US/Central.
# Dual cron to cover CST (UTC-6 -> 22:00 UTC) and CDT (UTC-5 -> 21:00 UTC).
# CT-hour guard enforces exactly one run per day.
on:
  schedule:
    - cron: "0 21 * * *"   # 16:00 CT during CDT (Mar-Nov)
    - cron: "0 22 * * *"   # 16:00 CT during CST (Nov-Mar)
  workflow_dispatch:
    inputs:
      publish:
        description: "Invoke real publishers (X, Discord, Email)? Default OFF for shadow-mode -- picks are saved but nothing is posted."
        default: "false"
      dry_run:
        description: "Dry run mode (no real posts)?"
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      EDGE_EQUATION_DB:        ${{ secrets.EDGE_EQUATION_DB || 'edge_equation.db' }}
      TURSO_AUTH_TOKEN:        ${{ secrets.TURSO_AUTH_TOKEN }}
      THE_ODDS_API_KEY:        ${{ secrets.THE_ODDS_API_KEY }}
      X_API_KEY:               ${{ secrets.X_API_KEY }}
      X_API_SECRET:            ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN:          ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET:   ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      DISCORD_WEBHOOK_URL:     ${{ secrets.DISCORD_WEBHOOK_URL }}
      SMTP_HOST:               ${{ secrets.SMTP_HOST }}
      SMTP_PORT:               ${{ secrets.SMTP_PORT }}
      SMTP_USER:               ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM:               ${{ secrets.SMTP_FROM }}
      SMTP_TO:                 ${{ secrets.SMTP_TO || 'ProfessorEdgeCash@gmail.com' }}
      EMAIL_TO:                ${{ secrets.EMAIL_TO || 'ProfessorEdgeCash@gmail.com' }}
      EDGE_EQUATION_FAILSAFE_DIR: ${{ github.workspace }}/data/failsafes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: CT-hour guard
        id: guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          python - <<'PY' >> "$GITHUB_OUTPUT"
          # GitHub cron is regularly delayed; accept any fire within a
          # 4-hour window after the expected UTC fire time. Idempotency
          # prevents double-processing if both DST twins sneak through.
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          expected_ct = 16
          delay_tolerance = 4
          now_ct = datetime.now(ZoneInfo("America/Chicago"))
          dst_active = bool(now_ct.dst())
          expected_utc = (expected_ct + (5 if dst_active else 6)) % 24
          now_utc = datetime.now(timezone.utc)
          hours_since = (now_utc.hour - expected_utc) % 24
          should_run = hours_since <= delay_tolerance
          print(f"should_run={'true' if should_run else 'false'}")
          print(f"ct_hour={now_ct.hour} utc_hour={now_utc.hour} "
                f"expected_utc={expected_utc} hours_since={hours_since} "
                f"dst_active={dst_active}")
          PY

      - name: Install package
        if: steps.guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore SQLite from cache (read-only)
        if: steps.guard.outputs.should_run == 'true'
        # Read-only: cadence never writes, only the refresher does.
        uses: actions/cache/restore@v4
        with:
          path: edge_equation.db
          key: edge-equation-db-${{ github.ref_name }}-read-${{ github.run_id }}
          restore-keys: |
            edge-equation-db-${{ github.ref_name }}-
            edge-equation-db-

      - name: Run spotlight
        if: steps.guard.outputs.should_run == 'true'
        run: |
          mkdir -p data/failsafes
          # Shadow-mode default: scheduled runs save picks to the DB but
          # never invoke publishers. To go public, dispatch manually with
          # publish=true.
          PUBLISH_FLAG="--no-publish"
          DRY_RUN_FLAG="--dry-run"
          # Manual dispatches rebuild the slate unconditionally; cron stays idempotent.
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Upgrade to live publishing only when explicitly requested.
            [ "${{ inputs.publish }}" = "true" ] && PUBLISH_FLAG="--publish"
            [ "${{ inputs.dry_run }}" = "false" ] && DRY_RUN_FLAG="--no-dry-run"
            FORCE_FLAG="--force"
          fi
          # --cached-only: data-refresher is the sole live-API consumer.
          python -m edge_equation spotlight $PUBLISH_FLAG $DRY_RUN_FLAG --public-mode --cached-only $FORCE_FLAG

      - name: Upload failsafe files
        if: always() && steps.guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: failsafes-spotlight-${{ github.run_id }}
          path: data/failsafes/
          if-no-files-found: ignore
          retention-days: 14
