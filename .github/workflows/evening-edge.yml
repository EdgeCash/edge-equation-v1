name: Evening Edge

# Runs the evening slate. Default 22:00 UTC = 6pm ET / 5pm CT.
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      leagues:
        description: "Comma-separated league codes"
        default: "MLB,NFL,NHL,NBA,KBO,NPB"
      publish:
        description: "Invoke real publishers (X, Discord, Email)?"
        default: "true"
      dry_run:
        description: "Dry run mode (no real posts)?"
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      THE_ODDS_API_KEY:        ${{ secrets.THE_ODDS_API_KEY }}
      X_API_KEY:               ${{ secrets.X_API_KEY }}
      X_API_SECRET:            ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN:          ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET:   ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      DISCORD_WEBHOOK_URL:     ${{ secrets.DISCORD_WEBHOOK_URL }}
      SMTP_HOST:               ${{ secrets.SMTP_HOST }}
      SMTP_PORT:               ${{ secrets.SMTP_PORT }}
      SMTP_USER:               ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM:               ${{ secrets.SMTP_FROM }}
      SMTP_TO:                 ${{ secrets.SMTP_TO }}
      EMAIL_TO:                ${{ secrets.EMAIL_TO }}
      EDGE_EQUATION_FAILSAFE_DIR: ${{ github.workspace }}/data/failsafes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore SQLite from cache
        uses: actions/cache@v4
        with:
          path: edge_equation.db
          key: edge-equation-db-${{ github.ref_name }}
          restore-keys: |
            edge-equation-db-

      - name: Run evening edge
        run: |
          mkdir -p data/failsafes
          PUBLISH_FLAG="--publish"
          DRY_RUN_FLAG="--no-dry-run"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            [ "${{ inputs.publish }}" = "true" ] || PUBLISH_FLAG="--no-publish"
            [ "${{ inputs.dry_run }}" = "false" ] || DRY_RUN_FLAG="--dry-run"
            LEAGUES="--leagues ${{ inputs.leagues }}"
          else
            LEAGUES=""
          fi
          python -m edge_equation evening $PUBLISH_FLAG $DRY_RUN_FLAG $LEAGUES

      - name: Upload failsafe files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafes-evening-${{ github.run_id }}
          path: data/failsafes/
          if-no-files-found: ignore
          retention-days: 14
