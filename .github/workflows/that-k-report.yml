name: That K Report

# Side-project content pipeline for @ThatK_Guy. Three jobs:
#
#   1. projections  -- scheduled 3:00 PM CT, emits "Tonight's K
#                      Projections" and uploads as an artifact.
#   2. supporting   -- scheduled 9:00 AM CT, emits 1-2 light
#                      supporting posts (K of the Night / Stat Drop
#                      / Throwback), auto-rotated by date.
#   3. results      -- workflow_dispatch ONLY (manual step per
#                      brief -- results stay operator-gated).
#
# Keeping all three in the same workflow so secrets / artifact
# naming / python setup stays DRY.  The job-level "if" filters by
# the inbound schedule OR manual dispatch.  DST-aware dual cron +
# zoneinfo CT guard matches the main cadence's pattern.

on:
  schedule:
    - cron: "0 20 * * *"   # 3:00 CT during CDT (projections)
    - cron: "0 21 * * *"   # 3:00 CT during CST (projections)
    - cron: "0 14 * * *"   # 9:00 CT during CDT (supporting)
    - cron: "0 15 * * *"   # 9:00 CT during CST (supporting)
  workflow_dispatch:
    inputs:
      mode:
        description: "projections | results | supporting"
        default: "projections"
      source:
        description: "sample (dry-run) | json (requires data/ files)"
        default: "sample"
      top_n:
        description: "Max pitchers in the projections report"
        default: "8"
      email:
        description: "Send the output via SMTP to EMAIL_TO?"
        default: "false"
      intro_70s:
        description: "Prepend a tasteful 70s intro line"
        default: "false"

jobs:
  projections:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.mode == 'projections'
      || (github.event_name == 'schedule' &&
          (github.event.schedule == '0 20 * * *' ||
           github.event.schedule == '0 21 * * *'))
    runs-on: ubuntu-latest
    env:
      EMAIL_TO:       ${{ secrets.EMAIL_TO || 'ProfessorEdgeCash@gmail.com' }}
      SMTP_HOST:      ${{ secrets.SMTP_HOST }}
      SMTP_PORT:      ${{ secrets.SMTP_PORT }}
      SMTP_USER:      ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:  ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM:      ${{ secrets.SMTP_FROM }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }

      - name: CT-hour guard (15 = 3pm)
        id: guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo("America/Chicago"))
          print(f"should_run={'true' if now.hour == 15 else 'false'}")
          PY

      - name: Install
        if: steps.guard.outputs.should_run == 'true'
        run: pip install -e .

      - name: Resolve date
        if: steps.guard.outputs.should_run == 'true'
        id: date
        shell: bash
        run: echo "run_date=$(TZ='America/Chicago' date +%F)" >> "$GITHUB_OUTPUT"

      - name: Generate projections
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          mkdir -p data
          SOURCE_FLAG="--sample"
          if [ "${{ github.event.inputs.source }}" = "json" ]; then
            SOURCE_FLAG="--slate data/thatk_slate.json"
          fi
          INTRO_FLAG=""
          if [ "${{ github.event.inputs.intro_70s }}" = "true" ]; then
            INTRO_FLAG="--intro-70s"
          fi
          TOP_N="${{ github.event.inputs.top_n }}"; TOP_N="${TOP_N:-8}"
          python -m edge_equation.that_k projections \
            $SOURCE_FLAG $INTRO_FLAG \
            --date "${{ steps.date.outputs.run_date }}" \
            --top-n "$TOP_N" \
            --out "data/thatk_projections.txt"
          echo "===== PROJECTIONS ====="
          cat data/thatk_projections.txt

      - uses: actions/upload-artifact@v4
        if: steps.guard.outputs.should_run == 'true'
        with:
          name: thatk-projections-${{ steps.date.outputs.run_date }}
          path: data/thatk_projections.txt

  supporting:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.mode == 'supporting'
      || (github.event_name == 'schedule' &&
          (github.event.schedule == '0 14 * * *' ||
           github.event.schedule == '0 15 * * *'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }

      - name: CT-hour guard (9 = 9am)
        id: guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo("America/Chicago"))
          print(f"should_run={'true' if now.hour == 9 else 'false'}")
          PY

      - name: Install
        if: steps.guard.outputs.should_run == 'true'
        run: pip install -e .

      - name: Resolve date
        if: steps.guard.outputs.should_run == 'true'
        id: date
        shell: bash
        run: echo "run_date=$(TZ='America/Chicago' date +%F)" >> "$GITHUB_OUTPUT"

      - name: Generate supporting content
        if: steps.guard.outputs.should_run == 'true'
        shell: bash
        run: |
          mkdir -p data
          SOURCE_FLAG="--sample"
          if [ "${{ github.event.inputs.source }}" = "json" ]; then
            # The supporting generator reads two optional payload files
            # when the operator wants hand-curated hooks; both default
            # to the built-in deterministic sample.
            [ -f data/thatk_last_night.json ] && \
              SOURCE_FLAG="$SOURCE_FLAG --last-night data/thatk_last_night.json"
            [ -f data/thatk_slate_hooks.json ] && \
              SOURCE_FLAG="$SOURCE_FLAG --slate-hooks data/thatk_slate_hooks.json"
            # If neither file was committed, fall back to sample so a
            # freshly-dispatched manual run still produces content.
            [ "$SOURCE_FLAG" = "--sample" ] || SOURCE_FLAG="${SOURCE_FLAG#--sample }"
          fi
          python -m edge_equation.that_k supporting \
            $SOURCE_FLAG \
            --date "${{ steps.date.outputs.run_date }}" \
            --n 2 \
            --out "data/thatk_supporting.txt"
          echo "===== SUPPORTING ====="
          cat data/thatk_supporting.txt

      - uses: actions/upload-artifact@v4
        if: steps.guard.outputs.should_run == 'true'
        with:
          name: thatk-supporting-${{ steps.date.outputs.run_date }}
          path: data/thatk_supporting.txt

  results:
    # Manual-only per the task spec -- operator reviews before posting
    # the Results card.
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.mode == 'results'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }

      - name: Install
        run: pip install -e .

      - name: Resolve date
        id: date
        shell: bash
        run: echo "run_date=$(TZ='America/Chicago' date +%F)" >> "$GITHUB_OUTPUT"

      - name: Restore ledger
        # Season totals persist across runs via a read+save cache pair
        # so each manual Results run increments yesterday's verdicts
        # into the running W-L.  Dispatch-only, so there's no risk of
        # a scheduled job racing with this writer.
        uses: actions/cache/restore@v4
        with:
          path: data/thatk_ledger.json
          key: thatk-ledger-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            thatk-ledger-${{ github.ref_name }}-
            thatk-ledger-

      - name: Render Results card
        shell: bash
        run: |
          mkdir -p data
          SOURCE_FLAG="--sample"
          if [ "${{ github.event.inputs.source }}" = "json" ]; then
            SOURCE_FLAG="--results data/thatk_results.json"
          fi
          INTRO_FLAG=""
          if [ "${{ github.event.inputs.intro_70s }}" = "true" ]; then
            INTRO_FLAG="--intro-70s"
          fi
          python -m edge_equation.that_k results \
            $SOURCE_FLAG $INTRO_FLAG \
            --date "${{ steps.date.outputs.run_date }}" \
            --ledger data/thatk_ledger.json \
            --out data/thatk_results.txt
          echo "===== RESULTS ====="
          cat data/thatk_results.txt

      - name: Save ledger
        uses: actions/cache/save@v4
        with:
          path: data/thatk_ledger.json
          key: thatk-ledger-${{ github.ref_name }}-${{ github.run_id }}

      - uses: actions/upload-artifact@v4
        with:
          name: thatk-results-${{ steps.date.outputs.run_date }}
          path: data/thatk_results.txt
