name: NRFI Walk-Forward Training (manual)

# One-shot manual trigger for the walk-forward training pipeline.
# Pulls the populated DuckDB store (assumes Phase 2a's backfill has
# already run), walks forward through the prediction window in 7-day
# chunks, fits a final TrainedBundle on the most-recent 18mo, and runs
# the sanity report comparing ML vs Poisson baseline.
#
# OUTPUT
# - Trained bundle pickles uploaded as a CI artifact (Phase 2c will
#   replace this with R2 upload + the weekly cron).
# - Sanity report printed to the run logs.
# - walkforward_calibration.jsonl uploaded for downstream diagnostics.
#
# DOES NOT promote the bundle to production. Phase 2c gates promotion
# on `sanity.passed_min_improvement == True`.

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "First date to predict on (default 2025-04-01 — gives ~7 months of warm-up)."
        required: false
        default: "2025-04-01"
      end_date:
        description: "Last date to predict on (inclusive). Default: today."
        required: false
        default: ""
      window_months:
        description: "Rolling training window size in months."
        required: false
        default: "18"
      chunk_days:
        description: "Walk-forward chunk size in days. Default 7 (weekly)."
        required: false
        default: "7"
      calibration_method:
        description: "isotonic, platt, or beta (production default)"
        required: false
        default: "beta"
      run_sanity:
        description: "Run the ML-vs-baseline sanity report after training. Default true."
        required: false
        default: "true"

jobs:
  walkforward:
    runs-on: ubuntu-latest
    # 6-hour cap is GH Actions' default; weekly walk-forward across
    # ~600 days fits comfortably (~14 minutes for the model fits +
    # the corpus loads).
    timeout-minutes: 350
    env:
      EDGE_EQUATION_FAILSAFE_DIR: ${{ github.workspace }}/data/failsafes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install [nrfi] extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[nrfi]"

      # Prefer the freshest DuckDB. Multiple workflows publish
      # `nrfi-duckdb-latest` under their own namespaces:
      #   * nrfi-weather-backfill.yml — re-uploads after weather +
      #     feature-blob rebuilds (PR #105+). This is the freshest
      #     after a manual mode='weather_then_rebuild' run.
      #   * nrfi-daily-email.yml — re-uploads after the daily email
      #     incrementally settles yesterday's picks.
      #   * backfill-historical.yml — the original chunked rebuild.
      # Try them in freshness order; first hit wins. The
      # `if: hashFiles(...)` guard on each fallback ensures we don't
      # overwrite a fresher copy with a staler one.
      - name: Hydrate DuckDB (weather backfill, freshest)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: nrfi-weather-backfill.yml
          workflow_conclusion: success
          name: nrfi-duckdb-latest
          path: data/nrfi_cache/
          if_no_artifact_found: warn

      - name: Hydrate DuckDB (daily email fallback)
        if: hashFiles('data/nrfi_cache/nrfi.duckdb') == ''
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: nrfi-daily-email.yml
          workflow_conclusion: success
          name: nrfi-duckdb-latest
          path: data/nrfi_cache/
          if_no_artifact_found: warn

      - name: Hydrate DuckDB (backfill-historical fallback)
        if: hashFiles('data/nrfi_cache/nrfi.duckdb') == ''
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: backfill-historical.yml
          name: nrfi-duckdb-latest
          path: data/nrfi_cache/
          if_no_artifact_found: warn

      - name: Hydrate Statcast parquet cache from latest backfill artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: backfill-historical.yml
          name: nrfi-statcast-cache-latest
          path: data/nrfi_cache/parquet/
          if_no_artifact_found: warn

      - name: Run walk-forward training
        run: |
          END_ARG=""
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            END_ARG="--to ${{ github.event.inputs.end_date }}"
          fi
          python -m edge_equation.engines.nrfi.training.walkforward \
            --from "${{ github.event.inputs.start_date }}" \
            $END_ARG \
            --window-months "${{ github.event.inputs.window_months }}" \
            --chunk-days "${{ github.event.inputs.chunk_days }}" \
            --calibration-method "${{ github.event.inputs.calibration_method }}"

      - name: Run sanity report
        if: ${{ github.event.inputs.run_sanity != 'false' }}
        # Sanity report exits 2 when the bundle didn't clear the
        # min-improvement gate. We don't fail the job on a soft
        # rejection — the operator reads the printed table and
        # decides what to do. The `--write-gate-marker` flag drops a
        # file at the given path IFF the gate passes; later steps
        # key off that file's existence to gate R2 promotion.
        continue-on-error: true
        run: |
          python -m edge_equation.engines.nrfi.training.sanity \
            --season 2026 \
            --write-gate-marker data/nrfi_models/.sanity_passed

      - name: Promote bundle to R2 (only when sanity gate passed)
        # Three-condition gate: sanity step ran AND created the marker
        # AND R2 secrets are available. Any failure here doesn't block
        # the artifact upload below — operator can still pull the
        # bundle manually from CI artifacts and inspect.
        if: ${{ hashFiles('data/nrfi_models/.sanity_passed') != '' }}
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL:      ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
        continue-on-error: true
        run: |
          python -m edge_equation.engines.nrfi.training.promote_bundle

      - name: Upload trained bundle artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nrfi-bundle-${{ github.run_id }}
          path: data/nrfi_models/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload walk-forward calibration JSONL
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nrfi-walkforward-calibration-${{ github.run_id }}
          path: data/nrfi_cache/walkforward_calibration.jsonl
          if-no-files-found: warn
          retention-days: 30
