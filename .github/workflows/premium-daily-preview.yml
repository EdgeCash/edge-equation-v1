name: Premium Daily (10am CT)

# Premium-subscriber daily email. Scheduled for 10:00 CT so subscribers
# receive the full analytical read (yesterday's Ledger + every A+/A/A-
# projection across every sport + Spotlight + top-10 Player Prop
# Projections + 3-6 leg Parlay of the Day + engine health) BEFORE the
# 11:00 CT free Daily Edge lands publicly. Early-access is the core
# subscription value prop.
#
# DST-aware: dual cron pair (one UTC hour for CDT, one for CST) with
# a stdlib-zoneinfo CT-hour guard picking exactly one line per day.
#
# Beta-test distribution: EMAIL_TO defaults to ProfessorEdgeCash@gmail.com
# until we point it at a transactional sender / list relay. No code
# change needed to broaden.

on:
  # MANUAL TRIGGER MODE — public-testing phase (2026-05-01).
  # Operator triggers this workflow via the GitHub Actions UI's
  # "Run workflow" button after verifying lineups + weather + umpires
  # are posted. See docs/MANUAL_DAILY_RELEASE.md for the full SOP.
  # To re-enable automatic cron, uncomment the schedule block below.
  #
  # schedule:
  #   - cron: "0 15 * * *"   # 10:00 CT during CDT (Mar-Nov)
  #   - cron: "0 16 * * *"   # 10:00 CT during CST (Nov-Mar)
  workflow_dispatch:
    inputs:
      prefer_mock:
        description: "Use mock ingestion sources instead of the live odds cache. DEFAULT OFF -- you almost always want real data. Flip to true only for pipeline-only smoke tests where ingestion correctness does not matter."
        default: "false"

jobs:
  premium:
    runs-on: ubuntu-latest
    env:
      EDGE_EQUATION_DB:        ${{ secrets.EDGE_EQUATION_DB || 'edge_equation.db' }}
      TURSO_AUTH_TOKEN:        ${{ secrets.TURSO_AUTH_TOKEN }}
      THE_ODDS_API_KEY:        ${{ secrets.THE_ODDS_API_KEY }}
      SMTP_HOST:               ${{ secrets.SMTP_HOST }}
      SMTP_PORT:               ${{ secrets.SMTP_PORT }}
      SMTP_USER:               ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM:               ${{ secrets.SMTP_FROM }}
      SMTP_TO:                 ${{ secrets.SMTP_TO || 'ProfessorEdgeCash@gmail.com' }}
      EMAIL_TO:                ${{ secrets.EMAIL_TO || 'ProfessorEdgeCash@gmail.com' }}
      EDGE_EQUATION_FAILSAFE_DIR: ${{ github.workspace }}/data/failsafes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: CT-hour guard
        id: guard
        shell: bash
        run: |
          # Manual dispatches always run; scheduled dual-cron picks the
          # line that matches the current CT hour (10).
          #
          # GitHub's scheduled cron is regularly delayed under load (we've
          # observed 2-9 hours of delay). The guard therefore accepts any
          # fire within a 4-hour window AFTER the expected UTC fire time
          # for the current DST state, not just the exact hour. This
          # tolerates delayed runs while idempotency (slate-already-built
          # short-circuit) prevents double-processing when both DST twins
          # sneak through on the same day.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          expected_ct = 10
          delay_tolerance = 4  # hours
          now_ct = datetime.now(ZoneInfo("America/Chicago"))
          dst_active = bool(now_ct.dst())
          expected_utc = (expected_ct + (5 if dst_active else 6)) % 24
          now_utc = datetime.now(timezone.utc)
          hours_since = (now_utc.hour - expected_utc) % 24
          should_run = hours_since <= delay_tolerance
          print(f"should_run={'true' if should_run else 'false'}")
          print(f"ct_hour={now_ct.hour} utc_hour={now_utc.hour} "
                f"expected_utc={expected_utc} hours_since={hours_since} "
                f"dst_active={dst_active}")
          PY

      - name: Install package
        if: steps.guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore SQLite from cache (read-only)
        if: steps.guard.outputs.should_run == 'true'
        # Read-only: premium never writes, only the refresher does.
        uses: actions/cache/restore@v4
        with:
          path: edge_equation.db
          key: edge-equation-db-${{ github.ref_name }}-read-${{ github.run_id }}
          restore-keys: |
            edge-equation-db-${{ github.ref_name }}-
            edge-equation-db-

      - name: Build and email premium daily card
        if: steps.guard.outputs.should_run == 'true'
        run: |
          mkdir -p data/failsafes
          MOCK_FLAG=""
          if [ "${{ inputs.prefer_mock }}" = "true" ]; then
            MOCK_FLAG="--prefer-mock"
          fi
          # --cached-only: the 7am data-refresher is the sole live-API
          # consumer, so premium reads from the morning-refreshed cache
          # and never burns its own Odds API credits.
          # --force is passed ONLY for manual dispatches. Scheduled runs
          # leave force off so the slate idempotency short-circuits a
          # second DST-twin firing on the same day -- prevents duplicate
          # emails when both crons sneak through a delay window.
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FORCE_FLAG="--force"
          fi
          python -m edge_equation premium-daily \
            --publish --no-dry-run \
            --cached-only $FORCE_FLAG \
            $MOCK_FLAG

      - name: Generate operator picks CSV
        if: steps.guard.outputs.should_run == 'true'
        run: |
          # One-row-per-pick spreadsheet covering today's slate. Sort
          # order: grade A+ on top, then edge descending. Emitted as
          # a workflow artifact below so the operator can download it
          # straight from the Actions UI without needing DB access.
          mkdir -p picks_csv
          python -m edge_equation picks-csv \
            --out "picks_csv/picks_$(date -u +%Y-%m-%d).csv"

      - name: Upload picks CSV artifact
        if: always() && steps.guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: picks-csv-${{ github.run_id }}
          path: picks_csv/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload failsafe files (SMTP errors only)
        if: always() && steps.guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: failsafes-premium-${{ github.run_id }}
          path: data/failsafes/
          if-no-files-found: ignore
          retention-days: 14
