name: Premium Daily Preview

# Manual-only: builds the Premium Daily card (every A+/A/A- pick, parlay
# of the day, top 6 DFS props, yesterday's engine hit rate) and emails
# it to ProfessorEdgeCash@gmail.com for review before going live to
# paying subscribers. Zero X exposure.
#
# Usage:
#   gh workflow run premium-daily-preview.yml -f leagues=MLB,NHL,KBO,NPB
#
# Requires SMTP secrets only. No X credentials used.

on:
  workflow_dispatch:
    inputs:
      leagues:
        description: "Comma-separated league codes"
        default: "MLB,NFL,NHL,NBA,KBO,NPB"
      prefer_mock:
        description: "Use mock ingestion sources (skip the odds API)"
        default: "true"

jobs:
  premium:
    runs-on: ubuntu-latest
    env:
      EDGE_EQUATION_DB:        ${{ secrets.EDGE_EQUATION_DB || 'edge_equation.db' }}
      TURSO_AUTH_TOKEN:        ${{ secrets.TURSO_AUTH_TOKEN }}
      THE_ODDS_API_KEY:        ${{ secrets.THE_ODDS_API_KEY }}
      SMTP_HOST:               ${{ secrets.SMTP_HOST }}
      SMTP_PORT:               ${{ secrets.SMTP_PORT }}
      SMTP_USER:               ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM:               ${{ secrets.SMTP_FROM }}
      SMTP_TO:                 ${{ secrets.SMTP_TO || 'ProfessorEdgeCash@gmail.com' }}
      EMAIL_TO:                ${{ secrets.EMAIL_TO || 'ProfessorEdgeCash@gmail.com' }}
      EDGE_EQUATION_FAILSAFE_DIR: ${{ github.workspace }}/data/failsafes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore SQLite from cache
        uses: actions/cache@v4
        with:
          path: edge_equation.db
          key: edge-equation-db-${{ github.ref_name }}
          restore-keys: |
            edge-equation-db-

      - name: Build and email premium daily card
        run: |
          mkdir -p data/failsafes
          MOCK_FLAG=""
          if [ "${{ inputs.prefer_mock }}" = "true" ]; then
            MOCK_FLAG="--prefer-mock"
          fi
          python -m edge_equation premium-daily \
            --leagues "${{ inputs.leagues }}" \
            --publish --no-dry-run \
            --force \
            $MOCK_FLAG

      - name: Upload failsafe files (SMTP errors only)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafes-premium-${{ github.run_id }}
          path: data/failsafes/
          if-no-files-found: ignore
          retention-days: 14
