name: Port MLB Backfill from Scrapers Repo

# Pulls the 4-season MLB backfill (2022-2025) from
# EdgeCash/edge-equation-scrapers' committed data/ folder into v1's
# data/backfill/mlb/. This is the dataset that was supposed to come
# over during the original consolidation but didn't get ported.
#
# What this fetches per season:
#   games.json           — completed games with linescore (~7 MB / season)
#   splits.json          — per-player vL/vR + handedness splits
#   statcast_xstats.json — REAL Statcast xwOBA/xBA/xSLG (replaces the
#                          FIP-proxy bootstrap)
#
# Plus top-level:
#   people.json          — handedness lookup
#
# What this does NOT fetch:
#   boxscores.tar.gz     — per-game compressed lineups + pitcher IDs.
#                          Large (~50 MB / season). Currently no
#                          consumer in v1; can be added later when
#                          BacktestEngine wires per-game pitcher data.
#
# Source repo: EdgeCash/edge-equation-scrapers (public). Files are
# fetched via raw.githubusercontent.com — no auth required.
#
# Run once. Manual trigger only.
on:
  workflow_dispatch:
    inputs:
      seasons:
        description: "Space-separated seasons to port (default: 2022 2023 2024 2025)."
        required: false
        default: "2022 2023 2024 2025"
      commit:
        description: "Commit and push to main. Set false to inspect via artifact only."
        type: boolean
        default: true

jobs:
  port:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name  "edge-equation-bot"
          git config user.email "bot@edge-equation.local"

      - name: Fetch backfill files from scrapers
        run: |
          set -euo pipefail
          BASE="https://raw.githubusercontent.com/EdgeCash/edge-equation-scrapers/main/data/backfill/mlb"
          DEST="data/backfill/mlb"
          mkdir -p "$DEST"

          echo "Fetching top-level people.json..."
          curl -fsSL --max-time 60 "$BASE/people.json" -o "$DEST/people.json"
          ls -la "$DEST/people.json"

          for season in ${{ github.event.inputs.seasons }}; do
            echo
            echo "=== Season $season ==="
            mkdir -p "$DEST/$season"
            for f in games.json splits.json statcast_xstats.json; do
              url="$BASE/$season/$f"
              out="$DEST/$season/$f"
              echo "  fetching $f..."
              if ! curl -fsSL --max-time 90 "$url" -o "$out"; then
                echo "  ERROR: $url failed"
                exit 1
              fi
              size=$(wc -c < "$out")
              echo "  ${out}: ${size} bytes"
            done
          done

      - name: Validate every file is JSON + has expected shape
        run: |
          PYTHONPATH=src python <<'PYEOF'
          import json, sys
          from pathlib import Path

          base = Path("data/backfill/mlb")
          fail = False

          # people.json
          ppath = base / "people.json"
          if not ppath.exists():
              print(f"FAIL: {ppath} missing")
              sys.exit(2)
          try:
              ppl = json.loads(ppath.read_text())
          except Exception as e:
              print(f"FAIL: {ppath} not valid JSON: {e}")
              sys.exit(2)
          # SplitsLoader expects {"players": {pid: {...}}}
          n_people = len(ppl.get("players", {}))
          print(f"  people.json: {n_people} players")
          if n_people < 100:
              print(f"FAIL: people.json has only {n_people} entries (expected hundreds)")
              fail = True

          # Per-season files
          for season_dir in sorted(base.glob("*/"), key=lambda p: p.name):
              if not season_dir.name.isdigit():
                  continue
              season = int(season_dir.name)
              print(f"\n  Season {season}:")

              games_path = season_dir / "games.json"
              if games_path.exists():
                  games = json.loads(games_path.read_text())
                  if not isinstance(games, list):
                      print(f"    FAIL: games.json is {type(games).__name__}, expected list")
                      fail = True
                  elif len(games) < 1000:
                      print(f"    FAIL: games.json has only {len(games)} games (expected ~2400)")
                      fail = True
                  else:
                      first = games[0]
                      missing = [k for k in ("date", "game_pk", "away_team", "home_team",
                                              "away_score", "home_score", "total")
                                  if k not in first]
                      if missing:
                          print(f"    FAIL: first game missing keys: {missing}")
                          fail = True
                      else:
                          print(f"    games.json: {len(games)} games, first={first['date']} {first['away_team']}@{first['home_team']}")
              else:
                  print(f"    FAIL: games.json missing")
                  fail = True

              xstats_path = season_dir / "statcast_xstats.json"
              if xstats_path.exists():
                  xstats = json.loads(xstats_path.read_text())
                  pitching = xstats.get("pitching", {})
                  batting = xstats.get("batting", {})
                  print(f"    statcast_xstats.json: {len(pitching)} pitchers, {len(batting)} batters")
                  if len(pitching) < 200:
                      print(f"    FAIL: only {len(pitching)} pitchers")
                      fail = True
                  # Spot-check xwoba range
                  bad = [pid for pid, r in pitching.items()
                          if r.get("xwoba") is not None and not (0.20 <= r["xwoba"] <= 0.45)]
                  if bad:
                      print(f"    FAIL: {len(bad)} pitchers with implausible xwoba (e.g. {bad[:3]})")
                      fail = True
                  # Pin the year-keyed regression
                  if str(season) in pitching:
                      print(f"    FAIL: '{season}' is a key in pitching dict — Savant CSV bug regressed")
                      fail = True
              else:
                  print(f"    FAIL: statcast_xstats.json missing")
                  fail = True

              splits_path = season_dir / "splits.json"
              if splits_path.exists():
                  splits = json.loads(splits_path.read_text())
                  if not isinstance(splits, dict):
                      print(f"    FAIL: splits.json is {type(splits).__name__}, expected dict")
                      fail = True
                  else:
                      hitting = splits.get("hitting", {})
                      pitching_s = splits.get("pitching", {})
                      print(f"    splits.json: {len(hitting)} hitters, {len(pitching_s)} pitchers")
              else:
                  print(f"    FAIL: splits.json missing")
                  fail = True

          if fail:
              print("\nVALIDATION FAILED — refusing to commit broken data.")
              sys.exit(2)
          print("\nValidation OK.")
          PYEOF

      - name: Smoke-test SplitsLoader against the new data
        run: |
          PYTHONPATH=src python <<'PYEOF'
          from pathlib import Path
          from edge_equation.exporters.mlb.splits_loader import SplitsLoader

          sl = SplitsLoader(Path("data/backfill/mlb"))
          for season in (2022, 2023, 2024, 2025):
              loaded = sl._load_season_xstats(season)
              if loaded is None:
                  print(f"  {season}: NOT loaded"); continue
              p = loaded.get("pitching", {})
              with_xwoba = sum(
                  1 for r in p.values()
                  if r.get("xwoba") is not None and r.get("pa", 0) >= 100
              )
              print(f"  {season}: pitchers with xwoba+PA>=100: {with_xwoba}/{len(p)}")
          # Smoke an actual lookup — Ohtani 660271 in 2024
          val = sl.pitcher_xwoba(660271, 2025)  # 2025 lookup uses 2024 prior
          print(f"  pitcher_xwoba(660271, 2025) = {val}")
          PYEOF

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-backfill-port-${{ github.run_id }}
          path: data/backfill/mlb/
          if-no-files-found: error
          retention-days: 30

      - name: Commit and push outputs
        if: ${{ github.event.inputs.commit != 'false' }}
        run: |
          git add data/backfill/mlb/ || true
          if git diff --staged --quiet; then
            echo "No new backfill files to commit (already at HEAD)."
            exit 0
          fi
          SEASONS_TAG="${{ github.event.inputs.seasons }}"
          git commit -m "data: port MLB backfill from scrapers (${SEASONS_TAG})

Pulls real Statcast statcast_xstats.json + games.json + splits.json
for the requested seasons from EdgeCash/edge-equation-scrapers.

Replaces the synthetic FIP-proxy 2025 file (PR #143). The next
mlb-daily run should show xwoba_hits/sp_total climb materially as
SPs get matched against real prior-season xwoba (vs the FIP proxy
which only had ~140 entries with a single approximation slope).

Multi-season backtest sample grows from 582 games to ~9,500 across
4 seasons, which alone may tighten the rolling Brier under the
0.246 gate on borderline markets (totals 0.2487, F1 0.2494)."
          git push

      - name: Dry-run notice
        if: ${{ github.event.inputs.commit == 'false' }}
        run: |
          echo "::notice::Inspect-only mode — files in artifact 'mlb-backfill-port-${{ github.run_id }}'. Set commit=true to land them on main."
