name: Overseas Edge (11pm CT)

# Phase 20 cadence slot 5 of 5: 23:00 US/Central.
# Dual cron to cover CST (UTC-6 -> 05:00 UTC next day) and CDT (UTC-5 -> 04:00 UTC next day).
# CT-hour guard enforces exactly one run per day.
#
# Overseas Edge scopes to KBO / NPB / Soccer and excludes every prop
# market (the PostingFormatter.filter_overseas pipeline enforces this at
# card-build time; the CLI's OVERSEAS_LEAGUES default keeps ingestion in
# sync with the filter).
on:
  schedule:
    - cron: "0 4 * * *"   # 23:00 CT during CDT (Mar-Nov) -> 04:00 UTC next day
    - cron: "0 5 * * *"   # 23:00 CT during CST (Nov-Mar) -> 05:00 UTC next day
  workflow_dispatch:
    inputs:
      leagues:
        description: "Comma-separated league codes (overseas default)"
        default: "KBO,NPB,EPL,UCL"
      publish:
        description: "Invoke real publishers (X, Discord, Email)?"
        default: "true"
      dry_run:
        description: "Dry run mode (no real posts)?"
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      EDGE_EQUATION_DB:        ${{ secrets.EDGE_EQUATION_DB || 'edge_equation.db' }}
      TURSO_AUTH_TOKEN:        ${{ secrets.TURSO_AUTH_TOKEN }}
      THE_ODDS_API_KEY:        ${{ secrets.THE_ODDS_API_KEY }}
      X_API_KEY:               ${{ secrets.X_API_KEY }}
      X_API_SECRET:            ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN:          ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET:   ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      DISCORD_WEBHOOK_URL:     ${{ secrets.DISCORD_WEBHOOK_URL }}
      SMTP_HOST:               ${{ secrets.SMTP_HOST }}
      SMTP_PORT:               ${{ secrets.SMTP_PORT }}
      SMTP_USER:               ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM:               ${{ secrets.SMTP_FROM }}
      SMTP_TO:                 ${{ secrets.SMTP_TO || 'ProfessorEdgeCash@gmail.com' }}
      EMAIL_TO:                ${{ secrets.EMAIL_TO || 'ProfessorEdgeCash@gmail.com' }}
      EDGE_EQUATION_FAILSAFE_DIR: ${{ github.workspace }}/data/failsafes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: CT-hour guard
        id: guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime
          from zoneinfo import ZoneInfo
          expected = 23
          now = datetime.now(ZoneInfo("America/Chicago"))
          print(f"should_run={'true' if now.hour == expected else 'false'}")
          print(f"ct_hour={now.hour}")
          PY

      - name: Install package
        if: steps.guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore SQLite from cache (read-only)
        if: steps.guard.outputs.should_run == 'true'
        # Read-only: cadence never writes, only the refresher does.
        uses: actions/cache/restore@v4
        with:
          path: edge_equation.db
          key: edge-equation-db-${{ github.ref_name }}-read-${{ github.run_id }}
          restore-keys: |
            edge-equation-db-${{ github.ref_name }}-
            edge-equation-db-

      - name: Run overseas edge
        if: steps.guard.outputs.should_run == 'true'
        run: |
          mkdir -p data/failsafes
          PUBLISH_FLAG="--publish"
          DRY_RUN_FLAG="--no-dry-run"
          LEAGUES=""
          # Manual dispatches rebuild the slate unconditionally; cron stays idempotent.
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            [ "${{ inputs.publish }}" = "true" ] || PUBLISH_FLAG="--no-publish"
            [ "${{ inputs.dry_run }}" = "false" ] || DRY_RUN_FLAG="--dry-run"
            LEAGUES="--leagues ${{ inputs.leagues }}"
            FORCE_FLAG="--force"
          fi
          # --cached-only: data-refresher is the sole live-API consumer.
          python -m edge_equation overseas $PUBLISH_FLAG $DRY_RUN_FLAG --public-mode --cached-only $LEAGUES $FORCE_FLAG

      - name: Upload failsafe files
        if: always() && steps.guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: failsafes-overseas-${{ github.run_id }}
          path: data/failsafes/
          if-no-files-found: ignore
          retention-days: 14
