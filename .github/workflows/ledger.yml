name: The Ledger (9am CT)

# Phase 20 cadence slot 1 of 5: 09:00 US/Central.
# Dual cron to cover CST (UTC-6 -> 15:00 UTC) and CDT (UTC-5 -> 14:00 UTC).
# The CT-hour guard below is the source of truth: it reads America/Chicago
# via stdlib zoneinfo and sets should_run=true only on the cron line that
# matches the current DST state, so exactly one run per day fires.
on:
  schedule:
    - cron: "0 14 * * *"   # 09:00 CT during CDT (Mar-Nov)
    - cron: "0 15 * * *"   # 09:00 CT during CST (Nov-Mar)
  workflow_dispatch:
    inputs:
      publish:
        description: "Invoke real publishers (X, Discord, Email)?"
        default: "true"
      dry_run:
        description: "Dry run mode (no real posts)?"
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      EDGE_EQUATION_DB:        ${{ secrets.EDGE_EQUATION_DB || 'edge_equation.db' }}
      TURSO_AUTH_TOKEN:        ${{ secrets.TURSO_AUTH_TOKEN }}
      THE_ODDS_API_KEY:        ${{ secrets.THE_ODDS_API_KEY }}
      X_API_KEY:               ${{ secrets.X_API_KEY }}
      X_API_SECRET:            ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN:          ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET:   ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      DISCORD_WEBHOOK_URL:     ${{ secrets.DISCORD_WEBHOOK_URL }}
      SMTP_HOST:               ${{ secrets.SMTP_HOST }}
      SMTP_PORT:               ${{ secrets.SMTP_PORT }}
      SMTP_USER:               ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM:               ${{ secrets.SMTP_FROM }}
      SMTP_TO:                 ${{ secrets.SMTP_TO || 'ProfessorEdgeCash@gmail.com' }}
      EMAIL_TO:                ${{ secrets.EMAIL_TO || 'ProfessorEdgeCash@gmail.com' }}
      EDGE_EQUATION_FAILSAFE_DIR: ${{ github.workspace }}/data/failsafes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: CT-hour guard
        id: guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime
          from zoneinfo import ZoneInfo
          expected = 9
          now = datetime.now(ZoneInfo("America/Chicago"))
          print(f"should_run={'true' if now.hour == expected else 'false'}")
          print(f"ct_hour={now.hour}")
          PY

      - name: Install package
        if: steps.guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore SQLite from cache (read-only)
        if: steps.guard.outputs.should_run == 'true'
        # Read-only so cadence can't overwrite the refresher's fresh
        # entry with its own empty-slate DB. Never-matching primary
        # key forces fall-through to the restore-keys prefix match.
        uses: actions/cache/restore@v4
        with:
          path: edge_equation.db
          key: edge-equation-db-${{ github.ref_name }}-read-${{ github.run_id }}
          restore-keys: |
            edge-equation-db-${{ github.ref_name }}-
            edge-equation-db-

      - name: Run the ledger
        if: steps.guard.outputs.should_run == 'true'
        run: |
          mkdir -p data/failsafes
          PUBLISH_FLAG="--publish"
          DRY_RUN_FLAG="--no-dry-run"
          # Manual dispatches rebuild the slate unconditionally; cron stays idempotent.
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            [ "${{ inputs.publish }}" = "true" ] || PUBLISH_FLAG="--no-publish"
            [ "${{ inputs.dry_run }}" = "false" ] || DRY_RUN_FLAG="--dry-run"
            FORCE_FLAG="--force"
          fi
          # --cached-only: data-refresher is the sole live-API consumer.
          python -m edge_equation ledger $PUBLISH_FLAG $DRY_RUN_FLAG --public-mode --cached-only $FORCE_FLAG

      - name: Upload failsafe files
        if: always() && steps.guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: failsafes-ledger-${{ github.run_id }}
          path: data/failsafes/
          if-no-files-found: ignore
          retention-days: 14
