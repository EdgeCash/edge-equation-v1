name: NRFI Calibration Audit (on demand)

# Manually-triggered diagnostic. Runs the calibration audit against
# the trained NRFI bundle's walk-forward holdout predictions and
# posts the side-by-side calibrator comparison to the workflow's
# step summary so the operator can read the result on mobile.
#
# Inputs are all optional — defaults give the standard 70/30 split
# at seed 42.
#
# Trigger from the GitHub UI: Actions tab → "NRFI Calibration Audit"
# → "Run workflow". Hit "Run workflow" again to re-run with different
# inputs.

on:
  workflow_dispatch:
    inputs:
      train_frac:
        description: "Train/eval split fraction (default 0.7 = 70% fit, 30% eval)"
        required: false
        default: "0.7"
      seed:
        description: "RNG seed for the train/eval split (default 42)"
        required: false
        default: "42"

jobs:
  calibration-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # Audit needs sklearn (for production calibrators in the
          # comparison) + the NRFI engine to load the persisted
          # walk-forward predictions. The full [nrfi] extras keep us
          # parity-safe with the daily-email runtime.
          pip install -e ".[nrfi]"

      # The audit needs the walk-forward calibration JSONL written by
      # the trainer. Both nrfi-walkforward-train.yml and
      # nrfi-weekly-retrain.yml publish it as
      # `nrfi-walkforward-calibration-<run_id>` (run-id-suffixed so
      # historical runs survive). Pull the most recent successful
      # match from either source — first hit wins.
      - name: Hydrate walk-forward JSONL (weekly retrain)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: nrfi-weekly-retrain.yml
          workflow_conclusion: success
          name: nrfi-walkforward-calibration-.*
          name_is_regexp: true
          path: data/nrfi_cache/
          if_no_artifact_found: warn

      - name: Hydrate walk-forward JSONL (manual walkforward-train fallback)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        if: hashFiles('data/nrfi_cache/walkforward_calibration.jsonl') == ''
        with:
          workflow: nrfi-walkforward-train.yml
          workflow_conclusion: success
          name: nrfi-walkforward-calibration-.*
          name_is_regexp: true
          path: data/nrfi_cache/
          if_no_artifact_found: warn

      # The dawidd6 action with name_is_regexp downloads matching
      # artifacts into per-name subdirectories. Promote the JSONL into
      # the path the audit expects.
      - name: Locate walk-forward JSONL
        run: |
          set -e
          mkdir -p data/nrfi_cache
          # The download action puts each matching artifact in its own
          # named directory under the requested path.
          FOUND=$(find data/nrfi_cache -name 'walkforward_calibration.jsonl' -type f 2>/dev/null | head -1)
          if [ -n "$FOUND" ] && [ "$FOUND" != "data/nrfi_cache/walkforward_calibration.jsonl" ]; then
            cp "$FOUND" data/nrfi_cache/walkforward_calibration.jsonl
            echo "Hydrated JSONL from $FOUND"
          elif [ -f data/nrfi_cache/walkforward_calibration.jsonl ]; then
            echo "JSONL already at expected path"
          else
            echo "::warning::No walk-forward JSONL available — audit will fail with a friendly message."
          fi

      - name: Run calibration audit
        id: audit
        run: |
          OUTPUT_FILE="$RUNNER_TEMP/calibration_audit.txt"
          set +e
          python -m edge_equation.engines.nrfi.evaluation.calibration_audit \
              --from-bundle \
              --train-frac ${{ github.event.inputs.train_frac }} \
              --seed ${{ github.event.inputs.seed }} \
              > "$OUTPUT_FILE" 2>&1
          AUDIT_RC=$?
          set -e

          # Always echo to the job log so it appears in the live tail.
          cat "$OUTPUT_FILE"

          # Post to the workflow's step summary — this is what the
          # operator reads on mobile under the run's "Summary" tab.
          {
            echo "## NRFI Calibration Audit"
            echo ""
            echo "**Inputs:** train_frac=${{ github.event.inputs.train_frac }}, seed=${{ github.event.inputs.seed }}"
            echo ""
            if [ $AUDIT_RC -eq 0 ]; then
              echo '```text'
              cat "$OUTPUT_FILE"
              echo '```'
            else
              echo "Audit exited with code $AUDIT_RC."
              echo ""
              echo '```text'
              cat "$OUTPUT_FILE"
              echo '```'
              echo ""
              echo "If the message above is *No walk-forward holdout record*, the bundle"
              echo "artifact didn't carry a walkforward_calibration.jsonl. Run the"
              echo "**NRFI Walkforward Train** workflow first, then re-run this audit."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit $AUDIT_RC

      - name: Upload audit text artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calibration-audit-output
          path: ${{ runner.temp }}/calibration_audit.txt
          if-no-files-found: warn
          retention-days: 30
