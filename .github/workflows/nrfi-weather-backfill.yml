name: NRFI Weather Backfill (on demand)

# Manually-triggered weather + corpus backfill. Three modes selectable
# via the `mode` input:
#
#   weather_only       — direct weather backfill (walks games table,
#                         fetches Open-Meteo archive per game, writes
#                         weather rows). Default. Idempotent. Fills
#                         historical gaps the corpus orchestrator's
#                         skip_completed=True misses.
#   force_rebuild      — force-rebuild every feature blob using current
#                         feature_engineering code. Use after merging
#                         a PR that adds new feature columns so the
#                         trainer can see them. Slow (re-runs Statcast
#                         per date).
#   weather_then_rebuild — weather_only first, then force_rebuild.
#                         Full pipeline; preferred after a PR that
#                         touches both data and feature code.
#   feature_pipeline   — original chunked corpus orchestrator
#                         (data/backfill.py from PR #101). Schedule +
#                         actuals + statcast + features for fresh dates
#                         only. Use for daily incremental refresh.
#
# Always: captures qa.py BEFORE + AFTER, posts the missing-rate delta
# to GITHUB_STEP_SUMMARY, re-uploads enriched DuckDB.
#
# Trigger from the GitHub UI: Actions tab → "NRFI Weather Backfill"
# → "Run workflow" → pick mode → Run.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Backfill mode."
        required: false
        default: "weather_then_rebuild"
        type: choice
        options:
          - weather_only
          - force_rebuild
          - weather_then_rebuild
          - feature_pipeline
      from_date:
        description: "Start date (YYYY-MM-DD). Default: 2025-01-01."
        required: false
        default: "2025-01-01"
      to_date:
        description: "End date (YYYY-MM-DD). Blank = today."
        required: false
        default: ""
      max_days:
        description: "Cap on chunk count (feature_pipeline mode only)."
        required: false
        default: ""
      include_odds:
        description: "Pull Odds API closing-line snapshots (feature_pipeline only)."
        required: false
        default: "false"

jobs:
  weather-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # full historical rebuild can run ~4-6 hrs
    env:
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[nrfi]"

      - name: Hydrate DuckDB from latest backfill artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: backfill-historical.yml
          name: nrfi-duckdb-latest
          path: data/nrfi_cache/
          if_no_artifact_found: warn

      - name: Capture corpus QA — BEFORE
        id: qa_before
        run: |
          OUTPUT_FILE="$RUNNER_TEMP/qa_before.txt"
          set +e
          python -m edge_equation.engines.nrfi.data.qa > "$OUTPUT_FILE" 2>&1
          QA_RC=$?
          set -e
          cat "$OUTPUT_FILE"
          if [ $QA_RC -ne 0 ]; then
            echo "::warning::QA before-snapshot exited $QA_RC — likely no DuckDB present."
            echo "(no corpus yet; backfill will create one)" > "$OUTPUT_FILE"
          fi
          MISS=$(grep -E "missing weather" "$OUTPUT_FILE" | awk '{print $3}' | tr -d '%' || echo "n/a")
          echo "missing_before=$MISS" >> "$GITHUB_OUTPUT"

      - name: Run backfill
        run: |
          MODE="${{ github.event.inputs.mode }}"
          DATE_TO="${{ github.event.inputs.to_date }}"
          DATE_ARGS="--from ${{ github.event.inputs.from_date }}"
          if [ -n "$DATE_TO" ]; then
            DATE_ARGS="$DATE_ARGS --to $DATE_TO"
          fi

          run_weather_only() {
            python -m edge_equation.engines.nrfi.data.weather_backfill \
                $DATE_ARGS --pause-seconds 0.05
          }
          run_force_rebuild() {
            python -m edge_equation.engines.nrfi.data.force_rebuild_features \
                $DATE_ARGS
          }
          run_feature_pipeline() {
            MAX_DAYS_ARG=""
            ODDS_ARG=""
            if [ -n "${{ github.event.inputs.max_days }}" ]; then
              MAX_DAYS_ARG="--max-days ${{ github.event.inputs.max_days }}"
            fi
            if [ "${{ github.event.inputs.include_odds }}" != "true" ]; then
              ODDS_ARG="--no-odds"
            fi
            python -m edge_equation.engines.nrfi.data.backfill \
                $DATE_ARGS $MAX_DAYS_ARG $ODDS_ARG
          }

          case "$MODE" in
            weather_only)         run_weather_only ;;
            force_rebuild)        run_force_rebuild ;;
            weather_then_rebuild) run_weather_only && run_force_rebuild ;;
            feature_pipeline)     run_feature_pipeline ;;
            *) echo "::error::unknown mode: $MODE"; exit 2 ;;
          esac

      - name: Capture corpus QA — AFTER
        id: qa_after
        run: |
          OUTPUT_FILE="$RUNNER_TEMP/qa_after.txt"
          python -m edge_equation.engines.nrfi.data.qa > "$OUTPUT_FILE" 2>&1
          cat "$OUTPUT_FILE"
          MISS=$(grep -E "missing weather" "$OUTPUT_FILE" | awk '{print $3}' | tr -d '%' || echo "n/a")
          echo "missing_after=$MISS" >> "$GITHUB_OUTPUT"

      - name: Post summary
        if: always()
        run: |
          MISS_BEFORE="${{ steps.qa_before.outputs.missing_before }}"
          MISS_AFTER="${{ steps.qa_after.outputs.missing_after }}"
          {
            echo "## NRFI Weather Backfill"
            echo ""
            echo "**Mode:** \`${{ github.event.inputs.mode }}\`"
            echo ""
            echo "| Metric | Before | After |"
            echo "|---|---|---|"
            echo "| Missing weather % | ${MISS_BEFORE:-n/a}% | ${MISS_AFTER:-n/a}% |"
            echo ""
            echo "### Corpus QA — BEFORE"
            echo '```text'
            cat "$RUNNER_TEMP/qa_before.txt" 2>/dev/null || echo "(unavailable)"
            echo '```'
            echo ""
            echo "### Corpus QA — AFTER"
            echo '```text'
            cat "$RUNNER_TEMP/qa_after.txt" 2>/dev/null || echo "(unavailable)"
            echo '```'
            echo ""
            echo "### Next step"
            echo ""
            echo "1. Run **NRFI Walkforward Train** (or wait for weekly retrain)"
            echo "   so the trainer rebuilds the bundle on the enriched corpus."
            echo "2. Run **NRFI Calibration Audit** to see if Brier moves."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Re-upload populated DuckDB (latest)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nrfi-duckdb-latest
          path: data/nrfi_cache/nrfi.duckdb
          if-no-files-found: warn
          retention-days: 30
          overwrite: true

      - name: Upload QA snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nrfi-weather-backfill-qa
          path: |
            ${{ runner.temp }}/qa_before.txt
            ${{ runner.temp }}/qa_after.txt
          if-no-files-found: warn
          retention-days: 30
