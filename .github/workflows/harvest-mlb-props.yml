name: Harvest -- MLB player-game backfill

# Pulls per-game-per-player MLB boxscores from MLB Stats API and writes
# `data/backfill/mlb/<season>/player_games.jsonl`. Resumable -- a re-run
# scans the JSONL and skips game_pks already present.
#
# Trigger from the Actions tab. Defaults pull recent 2 seasons at 1 RPS,
# which fits comfortably in GitHub's 6h job budget (~1.4h wall-clock for
# 5K games). Tweak the inputs to widen or narrow.
#
# After the script runs, the job commits any new JSONL lines back to the
# triggering branch (default: main). Safe to re-run -- the JSONL is
# append-only and the script only adds rows for games not already cached.

on:
  workflow_dispatch:
    inputs:
      seasons:
        description: "Space-separated seasons (default: 2024 2025)."
        required: false
        default: "2024 2025"
      rps:
        description: "Requests / second to MLB Stats API."
        required: false
        default: "1.0"
      limit:
        description: "Cap total games per season (smoke test). Empty = no cap."
        required: false
        default: ""
      commit:
        description: "Commit and push outputs (false = artifact only)."
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # 5h50m -- under the 6h hard cap
    concurrency:
      group: harvest-mlb-props-${{ github.ref }}
      cancel-in-progress: false   # let an in-flight harvest finish
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install requests (the only runtime dep the script needs)
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Configure git author (for the post-run commit)
        run: |
          git config user.name  "edge-equation-bot"
          git config user.email "bot@edge-equation.local"

      - name: Run backfill
        run: |
          set -euo pipefail
          ARGS=( --seasons ${{ github.event.inputs.seasons }} --rps ${{ github.event.inputs.rps }} )
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS+=( --limit ${{ github.event.inputs.limit }} )
          fi
          echo "Running: scripts/backfill_player_games.py ${ARGS[@]}"
          python scripts/backfill_player_games.py "${ARGS[@]}"

      - name: Show what changed
        run: |
          git status --short data/backfill/mlb/ || true
          for f in data/backfill/mlb/*/player_games.jsonl; do
            [ -f "$f" ] || continue
            echo "  $f: $(wc -l < "$f") lines, $(du -h "$f" | cut -f1)"
          done

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-player-games-${{ github.run_id }}
          path: data/backfill/mlb/*/player_games.jsonl
          if-no-files-found: warn
          retention-days: 30

      - name: Commit and push (resume-safe)
        if: ${{ github.event.inputs.commit != 'false' }}
        run: |
          set -euo pipefail
          git add data/backfill/mlb/ || true
          if git diff --staged --quiet; then
            echo "No new rows to commit."
            exit 0
          fi
          # Pull latest with rebase so a concurrent harvest on another
          # league doesn't race us. The JSONL files don't conflict
          # since only this league touches its own paths.
          git pull --rebase origin "${{ github.ref_name }}" || true
          git commit -m "harvest(mlb-props): seasons ${{ github.event.inputs.seasons }} (run ${{ github.run_id }})"
          for attempt in 1 2 3 4; do
            if git push origin "HEAD:${{ github.ref_name }}"; then
              echo "Push OK on attempt $attempt"
              exit 0
            fi
            echo "Push failed -- rebase + retry ($attempt)"
            git pull --rebase origin "${{ github.ref_name }}" || true
            sleep $((2 ** attempt))
          done
          echo "::error::Failed to push after 4 attempts"
          exit 1
