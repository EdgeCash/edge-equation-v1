name: NFL Daily

# Builds today's NFL picks JSON (per-row outputs + both strict
# parlay engines) and commits the new files to main.
#
# CRON SCHEDULE REMOVED — `daily-master.yml` is the canonical
# scheduler for every sport. This workflow stays available for
# ad-hoc operator runs via "Run workflow" when an NFL-only
# rebuild is needed.
on:
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD). Defaults to today (UTC)."
        required: false
        default: ""
      dry_run:
        description: "Dry run — build outputs and upload as artifact, but do NOT commit/push to main."
        type: boolean
        default: false

jobs:
  build:
    if: ${{ vars.NFL_PIPELINE_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Configure git
        run: |
          git config user.name  "edge-equation-bot"
          git config user.email "bot@edge-equation.local"

      - name: Build unified NFL card + daily feed
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          EDGE_FEATURE_NFL_PARLAYS: "on"
        run: |
          ARGS="--all"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          python run_daily_nfl.py $ARGS

      - name: List outputs
        run: |
          if [ -d website/public/data/nfl ]; then
            echo "Files in website/public/data/nfl/:"
            ls -la website/public/data/nfl/ || true
          else
            echo "website/public/data/nfl/ not found — orchestrator produced no outputs."
          fi

      - name: Upload outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nfl-daily-${{ github.run_id }}
          path: website/public/data/nfl/
          if-no-files-found: warn
          retention-days: 14

      - name: Commit and push outputs
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git add website/public/data/nfl/ website/public/data/daily/ || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          DATE_TAG=$(date -u +"%Y-%m-%d")
          git commit -m "Daily NFL card — $DATE_TAG (unified card + parlays)"
          # Pull --rebase before push so a concurrent commit doesn't
          # fail us with non-fast-forward. Matches daily-master.yml.
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            echo "Push attempt $attempt failed — pulling --rebase and retrying."
            git pull --rebase origin main
            sleep $((attempt * 2))
          done

      - name: Dry-run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "::notice::DRY RUN — outputs uploaded as artifact 'nfl-daily-${{ github.run_id }}'. No commit/push to main."
