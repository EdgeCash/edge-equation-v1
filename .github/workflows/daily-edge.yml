name: Daily Edge

# Runs the morning slate. Cron is in UTC -- default 13:00 UTC = 9am ET / 8am CT.
# Adjust the cron expression to taste, or trigger manually via workflow_dispatch.
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      leagues:
        description: "Comma-separated league codes"
        default: "MLB,NFL,NHL,NBA,KBO,NPB"
      publish:
        description: "Invoke real publishers (X, Discord, Email)?"
        default: "true"
      dry_run:
        description: "Dry run mode (no real posts)?"
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      # Database: defaults to a cached local SQLite file. Set both Turso
      # secrets on the repo to route straight to a hosted libSQL DB and
      # skip the cache step entirely.
      EDGE_EQUATION_DB:        ${{ secrets.EDGE_EQUATION_DB || 'edge_equation.db' }}
      TURSO_AUTH_TOKEN:        ${{ secrets.TURSO_AUTH_TOKEN }}

      # Optional sources
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}

      # X publisher
      X_API_KEY:               ${{ secrets.X_API_KEY }}
      X_API_SECRET:            ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN:          ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET:   ${{ secrets.X_ACCESS_TOKEN_SECRET }}

      # Discord publisher
      DISCORD_WEBHOOK_URL:     ${{ secrets.DISCORD_WEBHOOK_URL }}

      # Email publisher + failsafe (same SMTP backend)
      SMTP_HOST:               ${{ secrets.SMTP_HOST }}
      SMTP_PORT:               ${{ secrets.SMTP_PORT }}
      SMTP_USER:               ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM:               ${{ secrets.SMTP_FROM }}
      SMTP_TO:                 ${{ secrets.SMTP_TO }}
      EMAIL_TO:                ${{ secrets.EMAIL_TO }}

      # Route failsafe files into the workspace so the upload step can grab them
      EDGE_EQUATION_FAILSAFE_DIR: ${{ github.workspace }}/data/failsafes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # Cache the local SQLite file. Harmless no-op when EDGE_EQUATION_DB
      # is a libsql:// URL (the file never gets created so the cache stays
      # empty).
      - name: Restore SQLite from cache
        uses: actions/cache@v4
        with:
          path: edge_equation.db
          key: edge-equation-db-${{ github.ref_name }}
          restore-keys: |
            edge-equation-db-

      - name: Run daily edge
        run: |
          mkdir -p data/failsafes
          PUBLISH_FLAG="--publish"
          DRY_RUN_FLAG="--no-dry-run"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            [ "${{ inputs.publish }}" = "true" ] || PUBLISH_FLAG="--no-publish"
            [ "${{ inputs.dry_run }}" = "false" ] || DRY_RUN_FLAG="--dry-run"
            LEAGUES="--leagues ${{ inputs.leagues }}"
          else
            LEAGUES=""
          fi
          python -m edge_equation daily $PUBLISH_FLAG $DRY_RUN_FLAG $LEAGUES

      - name: Upload failsafe files (if any post failed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafes-daily-${{ github.run_id }}
          path: data/failsafes/
          if-no-files-found: ignore
          retention-days: 14
