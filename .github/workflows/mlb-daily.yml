name: MLB Daily Spreadsheet

# Builds today's full MLB card (NRFI/YRFI, full-game, props, both
# parlay engines) and the daily spreadsheet, then commits the new
# files to main, which triggers an automatic Vercel redeploy.
#
# CRON SCHEDULE REMOVED — `daily-master.yml` is the canonical
# scheduler for every sport. This workflow stays available for
# ad-hoc operator runs via the GitHub Actions UI's "Run workflow"
# button when a single-sport rebuild is needed.
on:
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD). Defaults to today (ET)."
        required: false
        default: ""
      skip_odds:
        description: "Skip odds fetch (Kelly falls back to -110)."
        type: boolean
        default: false
      dry_run:
        description: "Dry run — build outputs and upload as artifact, but do NOT commit/push to main."
        type: boolean
        default: false

jobs:
  build:
    if: ${{ vars.MLB_PIPELINE_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .[nrfi]
          pip install openpyxl

      - name: Configure git
        run: |
          git config user.name  "edge-equation-bot"
          git config user.email "bot@edge-equation.local"

      - name: Build daily spreadsheet
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          EDGE_FEATURE_SPREADSHEET_PIPELINE: "on"
        run: |
          ARGS="--include-backfill"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.skip_odds }}" = "true" ]; then
            ARGS="$ARGS --no-odds"
          fi
          python -m edge_equation.exporters.mlb.daily_spreadsheet $ARGS

      # Unified MLB card — NRFI/YRFI, full-game, props, both parlay
      # engines — plus the website daily-feed exporter that surfaces
      # all of the above on EdgeEquation.com. One command per the
      # operator's --all contract.
      - name: Build unified MLB card + daily feed
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          ARGS="--all"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          python run_daily_mlb.py $ARGS

      # Dry-run-friendly: list what was produced. Always runs so dry-run
      # invocations leave a clear record in the Actions log of which files
      # the orchestrator emitted, even when the commit step is skipped.
      - name: List outputs
        run: |
          if [ -d website/public/data/mlb ]; then
            echo "Files in website/public/data/mlb/:"
            ls -la website/public/data/mlb/ || true
            echo
            echo "File sizes:"
            du -h website/public/data/mlb/* 2>/dev/null || true
          else
            echo "website/public/data/mlb/ not found — orchestrator produced no outputs."
          fi

      # Always upload the outputs as an artifact so dry-run invocations
      # have a downloadable record. Live runs also get the artifact as a
      # belt-and-suspenders backup of what got committed.
      - name: Upload outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-daily-${{ github.run_id }}
          path: website/public/data/mlb/
          if-no-files-found: warn
          retention-days: 14

      - name: Commit and push outputs
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git add website/public/data/mlb/ website/public/data/daily/ || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          DATE_TAG=$(date -u +"%Y-%m-%d")
          git commit -m "Daily MLB card — $DATE_TAG (unified card + parlays)"
          # Pull --rebase before push so a concurrent commit on main
          # (e.g. the master cron mid-flight, or another sport's
          # workflow that just pushed) doesn't fail us with
          # non-fast-forward. Three attempts with back-off; matches
          # the daily-master.yml pattern.
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            echo "Push attempt $attempt failed — pulling --rebase and retrying."
            git pull --rebase origin main
            sleep $((attempt * 2))
          done

      - name: Dry-run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "::notice::DRY RUN — outputs uploaded as artifact 'mlb-daily-${{ github.run_id }}'. No commit/push to main. Download from the run's Summary page."
