name: WNBA Daily

# Builds today's WNBA picks JSON (per-row outputs + both strict
# parlay engines) and commits the new files to main.
#
# CRON SCHEDULE REMOVED — `daily-master.yml` is the canonical
# scheduler for every sport. This workflow stays available for
# ad-hoc operator runs via "Run workflow" when a WNBA-only
# rebuild is needed.
#
# Strict parlay engines remain feature-flagged via
# EDGE_FEATURE_WNBA_PARLAYS; manual dispatch sets it on inside
# the workflow only.
on:
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD). Defaults to today (UTC)."
        required: false
        default: ""
      skip_odds:
        description: "Skip the Odds API fetch (Kelly falls back to -110)."
        type: boolean
        default: false
      dry_run:
        description: "Dry run — build outputs and upload as artifact, but do NOT commit/push to main."
        type: boolean
        default: false

jobs:
  build:
    if: ${{ vars.WNBA_PIPELINE_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Configure git
        run: |
          git config user.name  "edge-equation-bot"
          git config user.email "bot@edge-equation.local"

      - name: Build daily WNBA picks
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          EDGE_FEATURE_WNBA_PIPELINE: "on"
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.skip_odds }}" = "true" ]; then
            ARGS="$ARGS --no-odds"
          fi
          python -m edge_equation.exporters.wnba.daily $ARGS

      # Unified WNBA card — per-row outputs + both strict parlay
      # engines + website daily feed. The parlay registry keys are
      # gated on EDGE_FEATURE_WNBA_PARLAYS so the runner here calls
      # run_daily_wnba.py directly (which doesn't go through the
      # registry). Site goes live with WNBA cards alongside MLB.
      - name: Build unified WNBA card + daily feed
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          EDGE_FEATURE_WNBA_PARLAYS: "on"
        run: |
          ARGS="--all"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          python run_daily_wnba.py $ARGS

      - name: List outputs
        run: |
          if [ -d website/public/data/wnba ]; then
            echo "Files in website/public/data/wnba/:"
            ls -la website/public/data/wnba/ || true
            echo
            echo "File sizes:"
            du -h website/public/data/wnba/* 2>/dev/null || true
          else
            echo "website/public/data/wnba/ not found — orchestrator produced no outputs."
          fi

      - name: Upload outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wnba-daily-${{ github.run_id }}
          path: website/public/data/wnba/
          if-no-files-found: warn
          retention-days: 14

      - name: Commit and push outputs
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git add website/public/data/wnba/ website/public/data/daily/ || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          DATE_TAG=$(date -u +"%Y-%m-%d")
          git commit -m "Daily WNBA card — $DATE_TAG (unified card + parlays)"
          # Pull --rebase before push so a concurrent commit doesn't
          # fail us with non-fast-forward. Matches daily-master.yml.
          pushed=0
          for attempt in 1 2 3; do
            if git push; then
              pushed=1
              break
            fi
            echo "Push attempt $attempt failed — pulling --rebase and retrying."
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          if [ "$pushed" -ne 1 ]; then
            echo "::error::Push failed after 3 attempts."
            exit 1
          fi

      - name: Dry-run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "::notice::DRY RUN — outputs uploaded as artifact 'wnba-daily-${{ github.run_id }}'. No commit/push to main."
