name: NRFI/YRFI Daily Email (9am CT)

# Standalone NRFI/YRFI daily email — separate from the premium Daily
# Edge so Professor Edge gets the first-inning board in its own
# inbox thread for internal testing.
#
# Scheduled for 09:00 CT, ~3-4 hours before the earliest MLB first
# pitch (most slates start at 12:35 CT). DST-aware via dual cron pair
# + a stdlib zoneinfo CT-hour guard, matching the premium-daily
# workflow's pattern.
#
# Recipient defaults to ProfessorEdgeCash@gmail.com. Override by
# setting the NRFI_EMAIL_TO repository secret (or the EMAIL_TO secret
# already used by the premium-daily workflow).

on:
  # MANUAL TRIGGER MODE — public-testing phase (2026-05-01).
  # Operator triggers this workflow via the GitHub Actions UI's
  # "Run workflow" button after verifying lineups + weather + umpires
  # are posted. See docs/MANUAL_DAILY_RELEASE.md for the full SOP.
  # To re-enable automatic cron, uncomment the schedule block below.
  #
  # schedule:
  #   - cron: "0 14 * * *"   # 09:00 CT during CDT (Mar-Nov)
  #   - cron: "0 15 * * *"   # 09:00 CT during CST (Nov-Mar)
  workflow_dispatch:
    inputs:
      confirm_lineups_posted:
        description: "I've confirmed lineups + weather + umpires are posted (REQUIRED — workflow refuses to send unless TRUE)."
        required: true
        default: "false"
      target_date:
        description: "Slate date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""
      dry_run:
        description: "Build the card and log it without sending email. DEFAULT FALSE."
        required: false
        default: "false"

permissions:
  contents: write   # required to commit website/public/data/daily/latest.json back to main

jobs:
  nrfi-email:
    runs-on: ubuntu-latest
    env:
      SMTP_HOST:        ${{ secrets.SMTP_HOST }}
      SMTP_PORT:        ${{ secrets.SMTP_PORT }}
      SMTP_USER:        ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM:        ${{ secrets.SMTP_FROM }}
      # Recipient precedence: NRFI_EMAIL_TO -> EMAIL_TO -> hard default.
      EMAIL_TO:         ${{ secrets.NRFI_EMAIL_TO || secrets.EMAIL_TO || 'ProfessorEdgeCash@gmail.com' }}
      SMTP_TO:          ${{ secrets.NRFI_EMAIL_TO || secrets.SMTP_TO || 'ProfessorEdgeCash@gmail.com' }}
      EDGE_EQUATION_FAILSAFE_DIR: ${{ github.workspace }}/data/failsafes
      # Required by the props + full-game engine fetchers invoked from
      # build_card. Without this the orchestrators short-circuit with
      # "Odds API key not set" and the email's PROPS BOARD / FULL-GAME
      # BOARD sections render empty even on a fully-priced slate.
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Lineup-confirmation gate
        # Manual-trigger mode (2026-05-01): operator must explicitly
        # confirm that today's lineups, weather, and umpires are
        # posted before we send. Refuse to proceed otherwise. This
        # is the single human-in-the-loop check that makes the
        # public-testing release safe.
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm_lineups_posted }}" != "true" ]; then
            echo "::error::Lineup confirmation NOT given. Set confirm_lineups_posted=true in the Run-workflow form before triggering."
            echo "This gate exists to prevent accidental sends before MLB has posted confirmed lineups (~2-3 hours pre-first-pitch)."
            exit 1
          fi
          echo "Lineup confirmation received. Proceeding."

      - name: CT-hour guard
        # Cron lines fire on both UTC slots (one for CDT, one for CST).
        # Skip the wrong one each season so we send exactly once per day.
        if: github.event_name == 'schedule'
        run: |
          python - <<'PY'
          import os, sys
          from datetime import datetime
          try:
              from zoneinfo import ZoneInfo
          except ImportError:
              sys.exit(0)
          hour = datetime.now(ZoneInfo("America/Chicago")).hour
          if hour != 9:
              print(f"::warning::CT hour is {hour}, not 9 — skipping run.")
              # Touch a sentinel that the next step keys off of.
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("SKIP_RUN=1\n")
          PY

      - name: Install deps
        if: env.SKIP_RUN != '1'
        run: |
          python -m pip install --upgrade pip
          # The email report imports edge_equation.engines.nrfi.data.storage
          # (duckdb), edge_equation.engines.nrfi.data.scrapers_etl (pybaseball),
          # and edge_equation.engines.nrfi.evaluation.backtest — i.e., the full
          # optional [nrfi] extras stack. The ML head (xgboost / lightgbm /
          # shap) is part of those extras but stays optional at runtime;
          # the engine bridge gracefully falls back to the deterministic
          # Poisson baseline when no trained bundle is on disk.
          pip install -e ".[nrfi]"

      # Phase 3 ledger + Phase 4 closing-line snapshots persist in the
      # DuckDB. Hydrate from the most recent artifact so the email's
      # auto-settle pass sees yesterday's settled history and today's
      # captured odds. Without this the YTD ledger renders empty and
      # the live-odds path always falls back to defaults.
      - name: Hydrate DuckDB from latest backfill artifact
        if: env.SKIP_RUN != '1'
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: backfill-historical.yml
          name: nrfi-duckdb-latest
          path: data/nrfi_cache/
          if_no_artifact_found: warn

      # Props uses a separate DuckDB at data/props_cache/props.duckdb.
      # Hydrate from the previous run of THIS workflow so yesterday's
      # predictions are already on disk for today's settle pass + ledger.
      # `continue-on-error` so first-ever runs don't fail.
      - name: Hydrate props DuckDB from latest artifact
        if: env.SKIP_RUN != '1'
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: nrfi-daily-email.yml
          name: props-duckdb-latest
          path: data/props_cache/
          if_no_artifact_found: warn

      # Full-Game uses its own DuckDB at data/fullgame_cache/fullgame.duckdb.
      # Same handoff pattern — yesterday's predictions need to land for
      # today's settle pass + ledger.
      - name: Hydrate full-game DuckDB from latest artifact
        if: env.SKIP_RUN != '1'
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: nrfi-daily-email.yml
          name: fullgame-duckdb-latest
          path: data/fullgame_cache/
          if_no_artifact_found: warn

      - name: Build & send NRFI email
        if: env.SKIP_RUN != '1'
        run: |
          DRY_RUN_ARG=""
          DATE_ARG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.target_date }}"
          fi
          python -m edge_equation.engines.nrfi.email_report $DATE_ARG $DRY_RUN_ARG

      # Build today's props card. Best-effort: any failure (Odds API
      # down, no qualifying picks) just leaves the props DuckDB
      # unchanged. The website feed step downstream will gracefully
      # render NRFI-only when no props rows exist for today.
      - name: Build props daily card
        if: env.SKIP_RUN != '1'
        continue-on-error: true
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.target_date }}"
          fi
          python -m edge_equation.engines.props_prizepicks.daily $DATE_ARG

      # Props sanity gate. Runs the projection-vs-market /
      # projection-vs-league-prior calibration check on the historical
      # window and prints the verdict. Soft failure (continue-on-error)
      # for now — once we accumulate >=50 settled picks the gate's
      # exit code can be promoted to a hard precondition for the
      # publish step below.
      - name: Run props sanity gate
        if: env.SKIP_RUN != '1'
        continue-on-error: true
        run: |
          if [ -f data/props_cache/props.duckdb ]; then
            END_DATE=$(date -u +%Y-%m-%d)
            if [ -n "${{ github.event.inputs.target_date }}" ]; then
              END_DATE="${{ github.event.inputs.target_date }}"
            fi
            START_DATE=$(date -u -d "$END_DATE - 365 days" +%Y-%m-%d 2>/dev/null \
              || python -c "from datetime import date, timedelta; \
                              print((date.fromisoformat('$END_DATE') - timedelta(days=365)).isoformat())")
            python -m edge_equation.engines.props_prizepicks.evaluation.sanity \
              --duckdb-path data/props_cache/props.duckdb \
              --from "$START_DATE" \
              --to "$END_DATE" \
              --json-out data/props_cache/sanity_report.json || true
          else
            echo "No props DuckDB on disk yet — skipping sanity gate."
          fi

      # Build today's full-game card (ML / Run_Line / Total / F5 / Team_Total).
      # Same best-effort posture as the props step.
      - name: Build full-game daily card
        if: env.SKIP_RUN != '1'
        continue-on-error: true
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.target_date }}"
          fi
          python -m edge_equation.engines.full_game.daily $DATE_ARG

      # Full-Game sanity gate (vs vig-corrected market + vs league prior).
      # Soft-fail until we accumulate enough settled picks; verdict is
      # logged + emitted as data/fullgame_cache/sanity_report.json.
      - name: Run full-game sanity gate
        if: env.SKIP_RUN != '1'
        continue-on-error: true
        run: |
          if [ -f data/fullgame_cache/fullgame.duckdb ]; then
            END_DATE=$(date -u +%Y-%m-%d)
            if [ -n "${{ github.event.inputs.target_date }}" ]; then
              END_DATE="${{ github.event.inputs.target_date }}"
            fi
            START_DATE=$(date -u -d "$END_DATE - 365 days" +%Y-%m-%d 2>/dev/null \
              || python -c "from datetime import date, timedelta; \
                              print((date.fromisoformat('$END_DATE') - timedelta(days=365)).isoformat())")
            python -m edge_equation.engines.full_game.evaluation.sanity \
              --duckdb-path data/fullgame_cache/fullgame.duckdb \
              --from "$START_DATE" \
              --to "$END_DATE" \
              --json-out data/fullgame_cache/sanity_report.json || true
          else
            echo "No full-game DuckDB on disk yet — skipping sanity gate."
          fi

      # Manual-mode publishing: after the email sends successfully,
      # write today's picks to website/public/data/daily/latest.json
      # and commit. Vercel auto-deploys; /daily-edge updates within
      # ~2 minutes. Skipped on dry-run since dry-runs don't represent
      # a real published slate. Includes the props + full-game DuckDBs
      # when present so /daily-edge surfaces today's tier-LEAN+ picks
      # across all three engines.
      - name: Publish daily feed to website
        if: env.SKIP_RUN != '1' && github.event.inputs.dry_run != 'true'
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.target_date }}"
          fi
          PROPS_ARG=""
          if [ -f data/props_cache/props.duckdb ]; then
            PROPS_ARG="--props-duckdb-path data/props_cache/props.duckdb"
          fi
          FG_ARG=""
          if [ -f data/fullgame_cache/fullgame.duckdb ]; then
            FG_ARG="--fullgame-duckdb-path data/fullgame_cache/fullgame.duckdb"
          fi
          python -m edge_equation.engines.website.build_daily_feed \
            --duckdb-path data/nrfi_cache/nrfi.duckdb \
            $PROPS_ARG \
            $FG_ARG \
            $DATE_ARG \
            --out-path website/public/data/daily/latest.json

      - name: Commit + push daily feed if changed
        if: env.SKIP_RUN != '1' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "edge-equation-bot"
          git config user.email "bot@edge-equation.local"
          git add website/public/data/daily/latest.json
          if git diff --cached --quiet; then
            echo "No change to latest.json — nothing to publish."
            exit 0
          fi
          git commit -m "website: refresh daily-edge picks ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          for i in 1 2 3 4; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, retrying..."
            sleep $((2 ** i))
          done
          echo "::error::Push failed after 4 attempts."
          exit 1

      - name: Upload failsafe artifacts (if any)
        if: always() && env.SKIP_RUN != '1'
        uses: actions/upload-artifact@v4
        with:
          name: nrfi-email-failsafes
          path: data/failsafes
          if-no-files-found: ignore
          retention-days: 14

      # Re-upload the populated DuckDB so today's settled picks + email
      # context survive into tomorrow's run. Same `nrfi-duckdb-latest`
      # name (overwrite=true) the weekly retrain + odds-snapshot
      # workflows use — they share one artifact handoff.
      - name: Re-upload populated DuckDB (latest)
        if: always() && env.SKIP_RUN != '1'
        uses: actions/upload-artifact@v4
        with:
          name: nrfi-duckdb-latest
          path: data/nrfi_cache/nrfi.duckdb
          if-no-files-found: warn
          retention-days: 30
          overwrite: true

      # Same handoff for props — today's predictions need to land in
      # tomorrow's run for the auto-settle pass + ledger render. We
      # use a separate artifact so the props DB lifecycle is decoupled
      # from the NRFI DB.
      - name: Re-upload populated props DuckDB (latest)
        if: always() && env.SKIP_RUN != '1'
        uses: actions/upload-artifact@v4
        with:
          name: props-duckdb-latest
          path: data/props_cache/props.duckdb
          if-no-files-found: ignore
          retention-days: 30
          overwrite: true

      # Same handoff for full-game.
      - name: Re-upload populated full-game DuckDB (latest)
        if: always() && env.SKIP_RUN != '1'
        uses: actions/upload-artifact@v4
        with:
          name: fullgame-duckdb-latest
          path: data/fullgame_cache/fullgame.duckdb
          if-no-files-found: ignore
          retention-days: 30
          overwrite: true
