name: NRFI/YRFI Daily Email (9am CT)

# Standalone NRFI/YRFI daily email — separate from the premium Daily
# Edge so Professor Edge gets the first-inning board in its own
# inbox thread for internal testing.
#
# Scheduled for 09:00 CT, ~3-4 hours before the earliest MLB first
# pitch (most slates start at 12:35 CT). DST-aware via dual cron pair
# + a stdlib zoneinfo CT-hour guard, matching the premium-daily
# workflow's pattern.
#
# Recipient defaults to ProfessorEdgeCash@gmail.com. Override by
# setting the NRFI_EMAIL_TO repository secret (or the EMAIL_TO secret
# already used by the premium-daily workflow).

on:
  schedule:
    - cron: "0 14 * * *"   # 09:00 CT during CDT (Mar-Nov)
    - cron: "0 15 * * *"   # 09:00 CT during CST (Nov-Mar)
  workflow_dispatch:
    inputs:
      target_date:
        description: "Slate date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""
      dry_run:
        description: "Build the card and log it without sending email. DEFAULT FALSE."
        required: false
        default: "false"

jobs:
  nrfi-email:
    runs-on: ubuntu-latest
    env:
      SMTP_HOST:        ${{ secrets.SMTP_HOST }}
      SMTP_PORT:        ${{ secrets.SMTP_PORT }}
      SMTP_USER:        ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM:        ${{ secrets.SMTP_FROM }}
      # Recipient precedence: NRFI_EMAIL_TO -> EMAIL_TO -> hard default.
      EMAIL_TO:         ${{ secrets.NRFI_EMAIL_TO || secrets.EMAIL_TO || 'ProfessorEdgeCash@gmail.com' }}
      SMTP_TO:          ${{ secrets.NRFI_EMAIL_TO || secrets.SMTP_TO || 'ProfessorEdgeCash@gmail.com' }}
      EDGE_EQUATION_FAILSAFE_DIR: ${{ github.workspace }}/data/failsafes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: CT-hour guard
        # Cron lines fire on both UTC slots (one for CDT, one for CST).
        # Skip the wrong one each season so we send exactly once per day.
        if: github.event_name == 'schedule'
        run: |
          python - <<'PY'
          import os, sys
          from datetime import datetime
          try:
              from zoneinfo import ZoneInfo
          except ImportError:
              sys.exit(0)
          hour = datetime.now(ZoneInfo("America/Chicago")).hour
          if hour != 9:
              print(f"::warning::CT hour is {hour}, not 9 — skipping run.")
              # Touch a sentinel that the next step keys off of.
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("SKIP_RUN=1\n")
          PY

      - name: Install deps
        if: env.SKIP_RUN != '1'
        run: |
          python -m pip install --upgrade pip
          # The email report imports edge_equation.engines.nrfi.data.storage
          # (duckdb), edge_equation.engines.nrfi.data.scrapers_etl (pybaseball),
          # and edge_equation.engines.nrfi.evaluation.backtest — i.e., the full
          # optional [nrfi] extras stack. The ML head (xgboost / lightgbm /
          # shap) is part of those extras but stays optional at runtime;
          # the engine bridge gracefully falls back to the deterministic
          # Poisson baseline when no trained bundle is on disk.
          pip install -e ".[nrfi]"

      # Phase 3 ledger + Phase 4 closing-line snapshots persist in the
      # DuckDB. Hydrate from the most recent artifact so the email's
      # auto-settle pass sees yesterday's settled history and today's
      # captured odds. Without this the YTD ledger renders empty and
      # the live-odds path always falls back to defaults.
      - name: Hydrate DuckDB from latest backfill artifact
        if: env.SKIP_RUN != '1'
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: backfill-historical.yml
          name: nrfi-duckdb-latest
          path: data/nrfi_cache/
          if_no_artifact_found: warn

      - name: Build & send NRFI email
        if: env.SKIP_RUN != '1'
        run: |
          DRY_RUN_ARG=""
          DATE_ARG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.target_date }}"
          fi
          python -m edge_equation.engines.nrfi.email_report $DATE_ARG $DRY_RUN_ARG

      - name: Upload failsafe artifacts (if any)
        if: always() && env.SKIP_RUN != '1'
        uses: actions/upload-artifact@v4
        with:
          name: nrfi-email-failsafes
          path: data/failsafes
          if-no-files-found: ignore
          retention-days: 14

      # Re-upload the populated DuckDB so today's settled picks + email
      # context survive into tomorrow's run. Same `nrfi-duckdb-latest`
      # name (overwrite=true) the weekly retrain + odds-snapshot
      # workflows use — they share one artifact handoff.
      - name: Re-upload populated DuckDB (latest)
        if: always() && env.SKIP_RUN != '1'
        uses: actions/upload-artifact@v4
        with:
          name: nrfi-duckdb-latest
          path: data/nrfi_cache/nrfi.duckdb
          if-no-files-found: warn
          retention-days: 30
          overwrite: true
