name: Bootstrap MLB Backfill (xwOBA)

# Pulls prior-season pitching stats from MLB Stats API and synthesizes
# an xwOBA proxy from FIP, writing
# data/backfill/mlb/<season>/statcast_xstats.json. This is what the
# SplitsLoader needs in order for the daily orchestrator's prior-season
# xwOBA blend to fire.
#
# History: an earlier version of this workflow scraped Baseball Savant
# CSVs directly. That parser silently produced a 337-byte file with one
# nonsense entry keyed on the year ("2025") and bogus xwOBA values
# (0.019). The current version uses MLB Stats API (same source the rest
# of the pipeline already uses successfully) plus a FIP→xwOBA linear
# proxy bounded to a plausible range. A real Savant integration is a
# future replacement; the JSON shape stays identical so SplitsLoader
# doesn't change.
#
# Run once per off-season (or whenever you want to refresh prior-season
# stats). Manual-only trigger — there's no scheduled cron because the
# data only updates once a year.
on:
  workflow_dispatch:
    inputs:
      seasons:
        description: "Space-separated list of seasons to bootstrap (default: prior season only, e.g. 2025 if today is 2026)."
        required: false
        default: ""
      commit:
        description: "Commit and push the resulting JSON files to main. Set false to inspect via artifact only."
        type: boolean
        default: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Configure git
        run: |
          git config user.name  "edge-equation-bot"
          git config user.email "bot@edge-equation.local"

      - name: Run bootstrap script
        run: |
          if [ -n "${{ github.event.inputs.seasons }}" ]; then
            python scripts/bootstrap_mlb_xstats.py --seasons ${{ github.event.inputs.seasons }}
          else
            python scripts/bootstrap_mlb_xstats.py
          fi

      - name: List generated files
        run: |
          echo "Files in data/backfill/mlb/:"
          ls -la data/backfill/mlb/ 2>&1 || true
          echo
          for d in data/backfill/mlb/*/; do
            if [ -d "$d" ]; then
              echo "$d:"
              ls -la "$d" 2>&1 || true
            fi
          done

      - name: Validate output via SplitsLoader
        run: |
          PYTHONPATH=src python -c "
          import sys
          from pathlib import Path
          from edge_equation.exporters.mlb.splits_loader import SplitsLoader

          backfill = Path('data/backfill/mlb')
          if not backfill.exists():
              print('ERROR: backfill dir missing'); sys.exit(1)

          fail = False
          sl = SplitsLoader(backfill)
          for season_dir in sorted(backfill.glob('*/'), key=lambda p: p.name):
              if not season_dir.name.isdigit(): continue
              season = int(season_dir.name)
              loaded = sl._load_season_xstats(season)
              if loaded is None:
                  print(f'  {season}: NOT loaded'); fail = True; continue
              pitching = loaded.get('pitching', {})
              p_count = len(pitching)
              # Hard checks (these fail the workflow):
              if p_count < 50:
                  print(f'  {season}: FAIL pitcher count {p_count} < 50'); fail = True
              for k in pitching:
                  if not k.isdigit():
                      print(f'  {season}: FAIL non-numeric key {k!r}'); fail = True; break
                  if k == str(season):
                      print(f'  {season}: FAIL key == season ({season}) — Savant CSV bug regressed'); fail = True; break
              # Spot-check: pitchers with xwoba+PA>=100
              with_xwoba = sum(
                  1 for r in pitching.values()
                  if r.get('xwoba') is not None and 0.20 <= r.get('xwoba', 0) <= 0.40
                  and r.get('pa', 0) >= 100
              )
              print(f'  {season}: pitchers={p_count}, with xwoba+PA>=100: {with_xwoba}')
              if with_xwoba < 50:
                  print(f'  {season}: FAIL only {with_xwoba} pitchers cleared PA threshold'); fail = True

          if fail:
              print('VALIDATION FAILED — refusing to commit broken data.')
              sys.exit(2)
          print('Validation OK.')
          "

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-backfill-${{ github.run_id }}
          path: data/backfill/mlb/
          if-no-files-found: error
          retention-days: 30

      - name: Commit and push outputs
        if: ${{ github.event.inputs.commit != 'false' }}
        run: |
          git add data/backfill/mlb/ || true
          if git diff --staged --quiet; then
            echo "No new backfill files to commit."
            exit 0
          fi
          SEASONS_TAG="$(ls data/backfill/mlb/ | grep -E '^[0-9]{4}$' | tr '\n' ' ' | sed 's/ $//')"
          git commit -m "data: bootstrap MLB xStats (FIP proxy) for seasons: $SEASONS_TAG"
          git push

      - name: Dry-run notice
        if: ${{ github.event.inputs.commit == 'false' }}
        run: |
          echo "::notice::Inspect-only mode — files in artifact 'mlb-backfill-${{ github.run_id }}'. Set commit=true to land them on main."

