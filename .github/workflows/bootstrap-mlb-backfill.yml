name: Bootstrap MLB Backfill (xwOBA)

# Pulls Baseball Savant expected-stats CSVs for the requested season(s)
# and writes data/backfill/mlb/<season>/statcast_xstats.json. This is
# what the SplitsLoader needs in order for the daily orchestrator's
# prior-season xwOBA blend to fire.
#
# Run once per off-season (or whenever you want to refresh prior-season
# xStats). Manual-only trigger — there's no scheduled cron because the
# data only updates once a year.
#
# After this lands, the next mlb-daily run should show
# `xwoba_hits/sp_total` go from 0/N to 24/24 (or close to it for SPs
# with >= 100 PAs in the prior season).
on:
  workflow_dispatch:
    inputs:
      seasons:
        description: "Space-separated list of seasons to bootstrap (default: prior season only, e.g. 2025 if today is 2026)."
        required: false
        default: ""
      commit:
        description: "Commit and push the resulting JSON files to main. Set false to inspect via artifact only."
        type: boolean
        default: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git
        run: |
          git config user.name  "edge-equation-bot"
          git config user.email "bot@edge-equation.local"

      - name: Run bootstrap script
        run: |
          if [ -n "${{ github.event.inputs.seasons }}" ]; then
            ./scripts/bootstrap_mlb_backfill.sh ${{ github.event.inputs.seasons }}
          else
            ./scripts/bootstrap_mlb_backfill.sh
          fi

      - name: List generated files
        run: |
          echo "Files in data/backfill/mlb/:"
          ls -la data/backfill/mlb/ 2>&1 || true
          echo
          for d in data/backfill/mlb/*/; do
            if [ -d "$d" ]; then
              echo "$d:"
              ls -la "$d" 2>&1 || true
            fi
          done

      - name: Sanity-check via SplitsLoader
        run: |
          python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, 'src')
          from edge_equation.exporters.mlb.splits_loader import SplitsLoader

          backfill = Path('data/backfill/mlb')
          if not backfill.exists():
              print('ERROR: backfill dir missing'); sys.exit(1)

          sl = SplitsLoader(backfill)
          for season_dir in sorted(backfill.glob('*/'), key=lambda p: p.name):
              if not season_dir.name.isdigit(): continue
              season = int(season_dir.name)
              loaded = sl._load_season_xstats(season)
              if loaded is None:
                  print(f'  {season}: NOT loaded')
                  continue
              p_count = len(loaded.get('pitching', {}))
              b_count = len(loaded.get('batting', {}))
              print(f'  {season}: pitchers={p_count}, batters={b_count}')
              # Spot-check: must have non-empty xwoba on at least one pitcher
              with_xwoba = sum(
                  1 for r in loaded.get('pitching', {}).values()
                  if r.get('xwoba') is not None and r.get('pa', 0) >= 100
              )
              print(f'  {season}: pitchers with xwoba+PA>=100: {with_xwoba}')
              if with_xwoba == 0:
                  print(f'  WARNING: 0 pitchers in {season} cleared the PA threshold')
          "

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-backfill-${{ github.run_id }}
          path: data/backfill/mlb/
          if-no-files-found: error
          retention-days: 30

      - name: Commit and push outputs
        if: ${{ github.event.inputs.commit != 'false' }}
        run: |
          git add data/backfill/mlb/ || true
          if git diff --staged --quiet; then
            echo "No new backfill files to commit."
            exit 0
          fi
          SEASONS_TAG="$(ls data/backfill/mlb/ | grep -E '^[0-9]{4}$' | tr '\n' ' ' | sed 's/ $//')"
          git commit -m "data: bootstrap MLB backfill (Statcast xStats) for seasons: $SEASONS_TAG"
          git push

      - name: Dry-run notice
        if: ${{ github.event.inputs.commit == 'false' }}
        run: |
          echo "::notice::Inspect-only mode — files in artifact 'mlb-backfill-${{ github.run_id }}'. Set commit=true to land them on main."
