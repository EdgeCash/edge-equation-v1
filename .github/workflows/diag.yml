name: Engine Diagnostic

# Read-only state snapshot of the persisted engine DB. Manual-only --
# never scheduled, never publishes, never modifies anything. Answers
# the "is the engine actually saving picks?" question without requiring
# log-scraping or a live DB shell.
#
# Output is a single JSON blob printed to stdout and also uploaded as
# a workflow artifact for easy downloading.

on:
  workflow_dispatch: {}

jobs:
  diag:
    runs-on: ubuntu-latest
    env:
      EDGE_EQUATION_DB: ${{ secrets.EDGE_EQUATION_DB || 'edge_equation.db' }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore SQLite from cache (read-only)
        # Matches the key pattern used by the cadence workflows so
        # this diagnostic sees the same DB they've been writing to.
        uses: actions/cache/restore@v4
        with:
          path: edge_equation.db
          key: edge-equation-db-${{ github.ref_name }}-read-${{ github.run_id }}
          restore-keys: |
            edge-equation-db-${{ github.ref_name }}-
            edge-equation-db-

      - name: Print diagnostic snapshot
        run: |
          mkdir -p diag
          python -m edge_equation diag | tee diag/snapshot.json

      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diag-${{ github.run_id }}
          path: diag/
          retention-days: 30
