name: Data Refresher (odds + schedules + scrapers)

# Warms the OddsCache so the five cadence workflows read from local
# cache instead of burning The Odds API credits on every run. Two
# refreshes per day: 07:00 CT (morning slate) and 15:00 CT (mid-
# afternoon line movement, feeds the 16:00 Spotlight and 18:00
# Evening Edge with fresh data).
#
# Free-tier Odds API ~500 credits/month. Cadence is now strictly
# cache-only; this workflow is the sole live-API consumer.
# ~8 calls per refresh x 2 refreshes/day x 30 days = ~480/month.
# Fits inside the free tier.
#
# DST-aware: dual cron pair per slot (one UTC hour for CDT, one for
# CST) with a stdlib-zoneinfo CT-hour guard picking exactly one line
# per day.
on:
  schedule:
    # 07:00 CT morning refresh: UTC 12 (CDT) / UTC 13 (CST)
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
    # 15:00 CT afternoon refresh: UTC 20 (CDT) / UTC 21 (CST)
    - cron: "0 20 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      slates:
        description: "Comma-separated slate names"
        default: "domestic,overseas"

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      EDGE_EQUATION_DB:        ${{ secrets.EDGE_EQUATION_DB || 'edge_equation.db' }}
      TURSO_AUTH_TOKEN:        ${{ secrets.TURSO_AUTH_TOKEN }}
      THE_ODDS_API_KEY:        ${{ secrets.THE_ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: CT-hour guard
        id: guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          python - <<'PY' >> "$GITHUB_OUTPUT"
          # GitHub cron is regularly delayed; accept either expected CT
          # slot (7:00 morning, 15:00 afternoon) with a 4-hour delay
          # window. Re-running the refresher is harmless: cache entries
          # are overwritten with fresh odds, so delay tolerance is safe.
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          expected_cts = (7, 15)
          delay_tolerance = 4
          now_ct = datetime.now(ZoneInfo("America/Chicago"))
          dst_active = bool(now_ct.dst())
          now_utc = datetime.now(timezone.utc)
          offset = 5 if dst_active else 6
          def in_window(expected_ct):
              expected_utc = (expected_ct + offset) % 24
              hours_since = (now_utc.hour - expected_utc) % 24
              return hours_since <= delay_tolerance
          should = any(in_window(h) for h in expected_cts)
          print(f"should_run={'true' if should else 'false'}")
          print(f"ct_hour={now_ct.hour} utc_hour={now_utc.hour} "
                f"dst_active={dst_active}")
          PY

      - name: Install package
        if: steps.guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore SQLite from cache
        if: steps.guard.outputs.should_run == 'true'
        # Restore-only pass: read whatever the previous refresher wrote
        # (via the restore-keys prefix fallback). We deliberately use
        # a never-matching primary key so we don't land on a stale
        # "edge-equation-db-main" entry that some old cadence run left
        # behind -- that's the original cache-overwrite bug we're
        # fixing here.
        uses: actions/cache/restore@v4
        with:
          path: edge_equation.db
          key: edge-equation-db-${{ github.ref_name }}-refresh-${{ github.run_id }}
          restore-keys: |
            edge-equation-db-${{ github.ref_name }}-
            edge-equation-db-

      - name: Refresh odds + schedules + scrapers
        if: steps.guard.outputs.should_run == 'true'
        run: |
          SLATES="${{ inputs.slates || 'domestic,overseas' }}"
          python -m edge_equation refresh-data --slates "$SLATES"

      - name: Save refreshed SQLite to a unique cache key
        # The refresher is the SOLE writer to the SQLite cache. Each
        # run writes to a unique key so subsequent cadence runs pull
        # the newest entry via their restore-keys prefix match. The
        # old immutable "edge-equation-db-main" entry is never written
        # to again and will evict naturally after 7 days unused.
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/cache/save@v4
        with:
          path: edge_equation.db
          key: edge-equation-db-${{ github.ref_name }}-${{ github.run_id }}
